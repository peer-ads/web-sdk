name: Bug Report
description: Report a bug in the PeerAds Web SDK
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.
        **Do not report security vulnerabilities here** — see [SECURITY.md](../../SECURITY.md).

  - type: input
    id: sdk-version
    attributes:
      label: SDK Version
      description: Version of @peerads/web
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & Version
      placeholder: e.g. Chrome 122, Safari 17, Firefox 123
    validations:
      required: true

  - type: dropdown
    id: ad-format
    attributes:
      label: Ad Format
      options:
        - Banner
        - Interstitial
        - Rewarded
        - All / Not format-specific
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console Errors / Stack Trace
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
    validations:
      required: false
